aid: mnt-halan
name: MNT-Halan
description: >-
  MNT-Halan is a Cairo, Egypt-headquartered fintech holding company and
  Egypt's first private fintech unicorn, founded in 2017 by Mounir Nakhla
  (CEO) and Ahmed Mohsen (CTO). MNT-Halan operates a financial super app
  ("Halan") and a vertically integrated digital ecosystem covering
  micro-finance and SME lending, consumer credit, e-payments and money
  transfers, an e-wallet, prepaid and installment cards, payroll advances,
  investment and gold-installment products, and e-commerce (electronics,
  appliances, FMCG, e-grocer). Lending products span nano loans up to
  EGP 2,000, microloans, consumer loans up to EGP 500,000 over 36
  installments, SME loans from EGP 200,000 up to EGP 15 million, education
  and home financing up to EGP 4 million, light-vehicle financing, and
  buy-now-pay-later. The Halan app and its supporting agent network
  reportedly serve 5–7 million customers, have disbursed in excess of
  USD 4 billion in loans across 3 million borrowers, and process
  100+ million USD in monthly payments and 50+ million USD in monthly
  e-commerce sales. After raising USD 400 million in 2023 to cross
  unicorn status and an additional USD 157.5 million in 2024 (including
  an IFC investment), MNT-Halan expanded beyond Egypt into Turkey
  (via the August 2024 acquisition of Tam Finans), the UAE (December
  2024 launch), and Pakistan. MNT-Halan's revenue model is interest
  and fees on lending, merchant and payment fees, e-commerce gross
  margin, and card interchange; the company markets directly to
  consumers and SMEs through its Halan app and physical outlets, and
  does not publish a public developer API, SDK, partner sandbox, or
  open-source code repository.
